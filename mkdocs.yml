site_name: Axiom Assertions
site_description: Deterministic fluent assertions for .NET tests with batching, analyzers, equivalency, JSON assertions, and vector and retrieval assertions.
site_url: https://spearzy.github.io/Axiom/
repo_url: https://github.com/spearzy/Axiom
repo_name: spearzy/Axiom
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Assertion Reference: assertion-reference.md
  - Compare and Migrate:
      - Migrate from xUnit Assert to Axiom: migrate-from-xunit-assert.md
      - Migrating to Axiom: migrating-to-axiom.md
      - Axiom vs FluentAssertions: axiom-vs-fluentassertions.md
      - Axiom vs Shouldly: axiom-vs-shouldly.md
  - Guides:
      - .NET Assertion Library: dotnet-assertion-library.md
      - Equivalency: equivalency.md
      - JSON: json.md
      - Vectors: vectors.md
      - Vector Assertions for AI and Retrieval Tests in .NET: vector-assertions-for-ai-and-retrieval-tests-in-dotnet.md
      - Custom Assertions: custom-assertions.md
      - Analyzers: analyzers.md
      - Benchmarks: benchmarks.md
markdown_extensions:
  - admonition
  - tables
  - meta
  - toc:
      permalink: true
