site_name: Axiom Docs
site_description: Deterministic fluent assertions for modern .NET tests.
site_url: https://spearzy.github.io/Axiom/
repo_url: https://github.com/spearzy/Axiom
repo_name: spearzy/Axiom
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Assertion Reference: assertion-reference.md
  - Equivalency: equivalency.md
  - Custom Assertions: custom-assertions.md
  - Analyzers: analyzers.md
  - Migrating to Axiom: migrating-to-axiom.md
  - Vectors: vectors.md
  - Benchmarks: benchmarks.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
