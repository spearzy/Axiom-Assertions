name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-test-pack:
    name: Build, Test, and Pack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Resolve package version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [ -z "$version" ] || [ "$version" = "$tag" ]; then
            echo "Release tags must use the format v<semver>, for example v0.1.0-preview.1."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Test (net10.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net10.0 --no-build

      - name: Test (net9.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net9.0 --no-build

      - name: Test (net8.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net8.0 --no-build

      - name: Pack Axiom.Core
        run: >
          dotnet pack src/Axiom.Core/Axiom.Core.csproj
          -c Release
          --no-build
          --output artifacts/packages
          /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Pack Axiom.Assertions
        run: >
          dotnet pack src/Axiom.Assertions/Axiom.Assertions.csproj
          -c Release
          --no-build
          --output artifacts/packages
          /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Consumer smoke test (xUnit)
        run: >
          bash eng/ci/run-consumer-smoke.sh
          "$GITHUB_WORKSPACE/artifacts/packages"
          "${{ steps.version.outputs.version }}"
          xunit

      - name: Consumer smoke test (NUnit)
        run: >
          bash eng/ci/run-consumer-smoke.sh
          "$GITHUB_WORKSPACE/artifacts/packages"
          "${{ steps.version.outputs.version }}"
          nunit

      - name: Consumer smoke test (MSTest)
        run: >
          bash eng/ci/run-consumer-smoke.sh
          "$GITHUB_WORKSPACE/artifacts/packages"
          "${{ steps.version.outputs.version }}"
          mstest

      - name: Upload package artefacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*
          if-no-files-found: error

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: build-test-pack
    environment:
      name: nuget-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package artefacts
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: Authenticate to NuGet
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_ORG_USERNAME }}

      - name: Push packages
        run: |
          dotnet nuget push artifacts/packages/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

          dotnet nuget push artifacts/packages/*.snupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from changelog
        run: |
          version="${GITHUB_REF_NAME#v}"

          # Pull only the matching changelog section:
          # "## [<version>] ..." up to (but not including) the next version heading.
          awk -v version="$version" '
            BEGIN { in_section = 0; found = 0 }
            /^## \[/ {
              if (in_section && $0 !~ "^## \\[" version "\\]") { exit }
              if ($0 ~ "^## \\[" version "\\]") {
                in_section = 1
                found = 1
              }
            }
            in_section { print }
            END {
              if (!found) { exit 2 }
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No release notes were found in CHANGELOG.md for version '$version'."
            exit 1
          fi

      - name: Create release entry
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
