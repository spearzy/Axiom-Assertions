name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
jobs:
  build-test:
    name: Build and Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Test (net10.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net10.0 --no-build

      - name: Test (net9.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net9.0 --no-build

      - name: Test (net8.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net8.0 --no-build

      - name: Test analyzers
        if: matrix.os == 'ubuntu-latest'
        run: dotnet test tests/Axiom.Analyzers.Tests/Axiom.Analyzers.Tests.csproj -c Release --no-build

      - name: Coverage Gate
        if: matrix.os == 'ubuntu-latest'
        run: >
          dotnet test tests/Axiom.Tests/Axiom.Tests.csproj
          -c Release
          -f net10.0
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutput=TestResults/Coverage/
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=85
          /p:ThresholdType=line
          /p:ThresholdStat=total

  docs-validation:
    name: Docs Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Validate benchmark snapshot
        run: bash eng/ci/run-benchmark-snapshot.sh validate

      - name: Test docs snippets
        run: dotnet test tests/Axiom.Docs.Snippets.Tests/Axiom.Docs.Snippets.Tests.csproj -c Release --no-build

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build docs site
        run: mkdocs build --strict

  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Verify formatting
        run: dotnet format Axiom.sln --verify-no-changes --no-restore

  package-consumption-smoke:
    name: Package Consumption Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Run package consumption smoke action
        uses: spearzy/dotnet-package-smoke@v1.0.0
        with:
          package-projects: |
            src/Axiom.Assertions/Axiom.Assertions.csproj
            src/Axiom.Core/Axiom.Core.csproj
            src/Axiom.Json/Axiom.Json.csproj
            src/Axiom.Http/Axiom.Http.csproj
            src/Axiom.Vectors/Axiom.Vectors.csproj
          consumer-target-frameworks: |
            net8.0
            net9.0
            net10.0
          configuration: Release
          restore-before-pack: false
          build-before-pack: false
          pack-arguments: >-
            --no-build
            --no-restore

  pack:
    name: Pack (no publish)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack Axiom.sln -c Release --no-build --output artifacts/packages

      - name: Consumer smoke test (xUnit)
        run: bash eng/ci/run-consumer-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages" xunit

      - name: Consumer analyzer smoke test
        run: bash eng/ci/run-assertions-analyzer-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages"

      - name: Standalone analyzer smoke test
        run: bash eng/ci/run-analyzers-package-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages"

      - name: Vectors package smoke test
        run: bash eng/ci/run-vectors-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages"

      - name: Json package smoke test
        run: bash eng/ci/run-json-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages"

      - name: Http package smoke test
        run: bash eng/ci/run-http-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages"

      - name: Consumer smoke test (NUnit)
        run: bash eng/ci/run-consumer-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages" nunit

      - name: Consumer smoke test (MSTest)
        run: bash eng/ci/run-consumer-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages" mstest

      - name: Consumer smoke test (no framework fallback)
        run: bash eng/ci/run-consumer-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages" plain
