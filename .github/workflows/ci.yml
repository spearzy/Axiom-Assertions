name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Test
        run: dotnet test Axiom.sln -c Release --no-build

  format:
    name: Format Check (scaffold)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Verify formatting
        run: dotnet format Axiom.sln --verify-no-changes --no-restore

  pack:
    name: Pack (no publish)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack Axiom.sln -c Release --no-build --output artifacts/packages
