name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: Build and Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Test (net10.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net10.0 --no-build

      - name: Test (net9.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net9.0 --no-build

      - name: Test (net8.0)
        run: dotnet test tests/Axiom.Tests/Axiom.Tests.csproj -c Release -f net8.0 --no-build

      - name: Coverage Gate
        if: matrix.os == 'ubuntu-latest'
        run: >
          dotnet test tests/Axiom.Tests/Axiom.Tests.csproj
          -c Release
          -f net10.0
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutput=TestResults/Coverage/
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=85
          /p:ThresholdType=line
          /p:ThresholdStat=total

  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Verify formatting
        run: dotnet format Axiom.sln --verify-no-changes --no-restore

  pack:
    name: Pack (no publish)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Axiom.sln

      - name: Build
        run: dotnet build Axiom.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack Axiom.sln -c Release --no-build --output artifacts/packages

      - name: Consumer smoke test (packaged Axiom.Assertions)
        run: bash eng/ci/run-consumer-smoke.sh "$GITHUB_WORKSPACE/artifacts/packages"
